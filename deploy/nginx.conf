server {
    listen 80;
    server_name your-domain.com;

    # 生产环境建议：
    # 1. 添加 SSL (certbot + Let's Encrypt)
    # 2. Vue 前端需在 vite.config.js 中设置 base: '/admin/'
    #    或改用 alias 替代 root（如下所示）
    # 3. 添加 /health 端点用于 upstream 健康检查

    # 热更新静态文件
    location /updates/ {
        alias /var/www/hive-updates/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # API 反向代理（通过 Unix socket 连接 uvicorn）
    location /api/ {
        proxy_pass http://unix:/var/run/hive-verify.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue 管理后台 SPA（history 模式）
    # 前提：vite.config.js 中 base: '/admin/' 且 build 输出到 /var/www/hive-admin/dist/
    location /admin/ {
        alias /var/www/hive-admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
}
