server {
    listen 80;
    server_name your-domain.com;

    # 生产环境建议：
    # 1. 添加 SSL (certbot + Let's Encrypt)
    # 2. Vue 前端需在 vite.config.js 中设置 base: '/admin/'
    #    或改用 alias 替代 root（如下所示）
    # 3. 添加 /health 端点用于 upstream 健康检查

    # 热更新静态文件
    # ⚠️ Phase 2 待补：生产环境应启用 token 鉴权，防止未授权下载。
    # LocalStorage 已实现 JWT 签名下载 URL，nginx 需配合 auth_request 校验 token 参数。
    # 参考配置:
    #   location /updates/ {
    #       auth_request /auth;
    #       alias /var/www/hive-updates/;
    #       expires 1h;
    #   }
    #   location = /auth {
    #       internal;
    #       proxy_pass http://unix:/var/run/hive-verify.sock/api/auth/verify-token;
    #       proxy_pass_request_body off;
    #       proxy_set_header Content-Length "";
    #       proxy_set_header X-Original-URI $request_uri;
    #   }
    location /updates/ {
        alias /var/www/hive-updates/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # API 反向代理（通过 Unix socket 连接 uvicorn）
    location /api/ {
        proxy_pass http://unix:/var/run/hive-verify.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue 管理后台 SPA（history 模式）
    # 前提：vite.config.js 中 base: '/admin/' 且 build 输出到 /var/www/hive-admin/dist/
    location /admin/ {
        alias /var/www/hive-admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
}
