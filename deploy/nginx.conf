server {
    listen 80;
    server_name your-domain.com;

    # 生产环境建议：
    # 1. 添加 SSL (certbot + Let's Encrypt)
    # 2. Vue 前端需在 vite.config.js 中设置 base: '/admin/'
    # 3. API 反向代理统一使用 TCP 127.0.0.1:8000（与 systemd service 绑定一致）

    # 上传文件大小限制（热更新包可达 500MB）
    client_max_body_size 500m;

    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /health/workers {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # 管理后台 API（必须在 /admin/ 静态路由之前注册）
    location /admin/api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 热更新静态文件
    # ⚠️ Phase 2 待补：生产环境应启用 token 鉴权
    location /updates/ {
        alias /var/www/hive-updates/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Vue 管理后台 SPA（history 模式）
    location /admin/ {
        alias /var/www/hive-admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }
}
